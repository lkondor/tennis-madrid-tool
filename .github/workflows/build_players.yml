name: Build Player Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # ogni giorno alle 06:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt || true

      - name: Run build_player_stats
        run: python scripts/build_player_stats.py

      - name: Commit updated players.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/live/players.json
          git commit -m "Update players stats" || echo "No changes"
          git push
